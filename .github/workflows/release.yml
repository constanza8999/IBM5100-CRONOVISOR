name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2025.1.0)'
        required: true
        type: string

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_gh_release.outputs.id }}
      upload_url: ${{ steps.create_gh_release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        run: |
          echo "## IBM 5100 Ultimate Collection" > release_notes.md
          echo "" >> release_notes.md
          echo "### What's Included" >> release_notes.md
          echo "- **Web Emulator**: Browser-based BASIC/APL interpreter" >> release_notes.md
          echo "- **MAME v0.287**: Full IBM 5100/5110 emulation" >> release_notes.md
          echo "- **AI Bridge**: NVIDIA AI integration" >> release_notes.md
          echo "- **Docs Archive**: 40+ original IBM documents" >> release_notes.md
          echo "- **PALM Assembly**: Demoscene side-scroller source code" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes in this Release" >> release_notes.md
          if [ -f CHANGELOG.md ]; then
            head -30 CHANGELOG.md >> release_notes.md
          fi

      - name: Create Release
        id: create_gh_release
        uses: softprops/action-gh-release@v2
        with:
          name: IBM 5100 Ultimate ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
